name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build --if-present

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            dist
            build
          if-no-files-found: error

  build-release-native:
    name: Build release Linux ${{ matrix.arch }} ${{ matrix.osname }}
    needs: frontend-build
    runs-on: ${{ matrix.runner }}
    container: debian:${{ matrix.debian }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            debian: "12"
            osname: bookworm

          - arch: amd64
            runner: ubuntu-latest
            debian: "13"
            osname: trixie

          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "12"
            osname: bookworm

          - arch: arm64
            runner: ubuntu-24.04-arm
            debian: "13"
            osname: trixie

    steps:
      - name: Install native build tools
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates curl git xz-utils build-essential \
            pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev clang mold binutils file dpkg

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: |
          set -eu

          CORES="$(nproc)"
          JOBS="$((CORES > 1 ? CORES - 1 : 1))"

          export CARGO_BUILD_JOBS="$JOBS"
          export MAKEFLAGS="-j$JOBS"

          echo "Using $JOBS build jobs out of $CORES cores"
          echo "Debian architecture:"
          dpkg --print-architecture

          npm run tauri build

      - name: Prepare release assets
        run: |
          set -eu

          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release-assets

          DEB_FILE="$(find src-tauri/target/release/bundle -type f -name "*.deb" | head -n 1 || true)"

          if [ -z "$DEB_FILE" ]; then
            echo "No .deb file found"
            find src-tauri/target -maxdepth 6 -type f | sort || true
            exit 1
          fi

          echo "Deb file: $DEB_FILE"
          DEB_ARCH="$(dpkg-deb -f "$DEB_FILE" Architecture)"
          echo "Deb architecture: $DEB_ARCH"

          if [ "$DEB_ARCH" != "${{ matrix.arch }}" ]; then
            echo "Expected .deb architecture ${{ matrix.arch }}, got $DEB_ARCH"
            exit 1
          fi

          cp -v "$DEB_FILE" "release-assets/streambot-touch_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}.deb"

          BIN_FILE="src-tauri/target/release/streambot-touch"

          if [ -f "$BIN_FILE" ]; then
            cp -v "$BIN_FILE" "release-assets/streambot-touch_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}"
            chmod +x "release-assets/streambot-touch_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}"
            file "release-assets/streambot-touch_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}" || true
            objdump -T "release-assets/streambot-touch_${VERSION}.${{ matrix.osname }}_${{ matrix.arch }}" | grep GLIBC_ | sort -Vu | tail -n 30 || true
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-streambot-touch-${{ matrix.osname }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Attach assets to release
    runs-on: ubuntu-latest
    needs:
      - build-release-native

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print | sort

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/*.deb
            release-assets/streambot-touch_*_amd64
            release-assets/streambot-touch_*_arm64
            release-assets/streambot-touch_*_armhf