---
outlines:
  default: { width: 44, height: 46 }
  small: { width: 36, height: 46 }
  wide: { width: 72, height: 46 }
  space: { width: 220, height: 46 }
  action: { width: 64, height: 46 }

views:
  base:
    - "q w e r t y u i o p"
    - "a s d f g h j k l"
    - "shift z x c v b n m backspace"
    - "symbols comma space period enter"
  shift:
    - "Q W E R T Y U I O P"
    - "A S D F G H J K L"
    - "shift Z X C V B N M backspace"
    - "symbols comma space period enter"
  symbols:
    - "1 2 3 4 5 6 7 8 9 0"
    - "exclam at hash dollar percent caret amp asterisk parenleft parenright"
    - "minus underscore plus equal slash backslash colon semicolon quote doublequote"
    - "base comma space period enter"

buttons:
  shift:
    action: locking
    keysym: Shift_L
    outline: action
  symbols:
    action: set_view
    view: symbols
    label: "123#!"
    outline: action
  base:
    action: set_view
    view: base
    label: "ABC"
    outline: action
  backspace:
    keysym: BackSpace
    label: "⌫"
    outline: action
  enter:
    keysym: Return
    label: "Enter"
    outline: action
  space:
    keysym: space
    label: "Space"
    outline: space
  comma:
    text: ","
    label: ","
    outline: small
  period:
    text: "."
    label: "."
    outline: small
  exclam: { text: "!", label: "!" }
  at: { text: "@", label: "@" }
  hash: { text: "#", label: "#" }
  dollar: { text: "$", label: "$" }
  percent: { text: "%", label: "%" }
  caret: { text: "^", label: "^" }
  amp: { text: "&", label: "&" }
  asterisk: { text: "*", label: "*" }
  parenleft: { text: "(", label: "(" }
  parenright: { text: ")", label: ")" }
  minus: { text: "-", label: "-" }
  underscore: { text: "_", label: "_" }
  plus: { text: "+", label: "+" }
  equal: { text: "=", label: "=" }
  slash: { text: "/", label: "/" }
  backslash: { text: "\\", label: "\\" }
  colon: { text: ":", label: ":" }
  semicolon: { text: ";", label: ";" }
  quote: { text: "'", label: "'" }
  doublequote: { text: '"', label: '"' }
